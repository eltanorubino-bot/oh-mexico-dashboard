    .header-btn.primary { background:#C4622D; border-color:#C4622D; }

    .tab-button.active { color:#D4A030; border-bottom-color:#D4A030; }
    .sub-tabs { display:flex; gap:12px; margin-bottom:20px; border-bottom:1px solid rgba(255,255,255,.1); padding-bottom:10px; }
    .sub-tab-button { padding:8px 14px; background:transparent; color:rgba(255,255,255,.5); border:none; font-size:13px; font-weight:500; cursor:pointer; transition:all .2s; border-bottom:2px solid transparent; position:relative; bottom:1px; }

    .kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; margin-bottom:28px; }
    .kpi-card { background:#FFF; padding:20px; border-radius:12px; box-shadow:0 1px 3px rgba(0,0,0,.1); transition:transform .2s; }

    .kpi-label { color:#6B7D3A; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
    .kpi-value { color:#1B2A4A; font-size:28px; font-weight:700; margin-bottom:4px; }
    .kpi-subtext { color:#999; font-size:11px; }
    .chart-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(380px,1fr)); gap:20px; margin-bottom:28px; }
    .chart-container { background:#FFF; padding:20px; border-radius:12px; box-shadow:0 1px 3px rgba(0,0,0,.1); }
    .chart-title { color:#1B2A4A; font-size:16px; font-weight:600; margin-bottom:16px; }
    .feed-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; margin-bottom:32px; }
    .feed-item { background:#FFF; border-radius:12px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.1); transition:transform .2s; }
    .feed-item:hover { transform:translateY(-3px); }
    .feed-item iframe { width:100%; height:480px; border-radius:12px; border:none; display:block; }
    .reels-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; margin-bottom:32px; }
    .reel-item { background:#FFF; border-radius:12px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.1); transition:transform .2s; }
    .reel-item:hover { transform:translateY(-3px); }
    .reel-item iframe { width:100%; height:340px; border-radius:12px; border:none; display:block; }
    .highlights-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:20px; margin-bottom:32px; }
    .highlight-card { text-align:center; cursor:pointer; transition:transform .2s; }
    .highlight-card:hover { transform:scale(1.05); }
    .highlight-circle { width:100px; height:100px; margin:0 auto 10px; border-radius:50%; background:linear-gradient(135deg,#C4622D,#D4A030); display:flex; align-items:center; justify-content:center; font-size:40px; border:3px solid #FFF; }
    .highlight-label { color:#FFF; font-size:11px; font-weight:600; }
    .competitor-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:20px; margin-bottom:28px; }
    .competitor-card { background:#FFF; border-radius:12px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.1); }
    .competitor-header { background:linear-gradient(135deg,#1B2A4A,#2a3a5a); color:#FFF; padding:16px; border-bottom:3px solid #C4622D; }
    .competitor-handle { font-size:16px; font-weight:700; margin-bottom:4px; }
    .competitor-stats { font-size:11px; opacity:.9; }
    .competitor-bio { padding:12px 16px; background:#F9FAFB; font-size:12px; color:#666; border-bottom:1px solid #eee; }
    .competitor-location { padding:10px 16px; font-size:11px; color:#999; border-bottom:1px solid #eee; }
    .competitor-posts { padding:12px; display:flex; gap:10px; }
    .competitor-post { flex:1; }
    .competitor-post iframe { width:100%; height:180px; border-radius:8px; border:none; display:block; }
    .comparison-chart { background:#FFF; border-radius:12px; padding:20px; box-shadow:0 1px 3px rgba(0,0,0,.1); margin-bottom:28px; }
    .calendar-grid { background:#FFF; border-radius:12px; padding:20px; box-shadow:0 1px 3px rgba(0,0,0,.1); }
    .calendar-header { display:grid; grid-template-columns:repeat(7,1fr); gap:8px; margin-bottom:12px; }
    .calendar-day-header { text-align:center; font-weight:600; color:#1B2A4A; padding:10px 0; border-bottom:2px solid #eee; font-size:13px; }
    .calendar-days { display:grid; grid-template-columns:repeat(7,1fr); gap:8px; }
    .calendar-day { padding:12px; background:#F9FAFB; border-radius:8px; min-height:90px; border:1px solid #eee; transition:all .2s; }
    .calendar-day:hover { background:#FFF; border-color:#C4622D; }
    .calendar-date { font-weight:600; color:#1B2A4A; margin-bottom:6px; font-size:11px; }

    .post-location-tag { margin-top:8px; font-size:11px; color:#999; }

    .generate-btn:active { transform:translateY(0); }

    .analyzer-post iframe { width:100%; height:480px; border-radius:12px; border:none; }
    .analyzer-results { background:#F9FAFB; border-radius:12px; padding:20px; border:1px solid #eee; }

    .score-mid { background:#FFF3E0; color:#E65100; }
    .score-low { background:#FFEBEE; color:#C62828; }
    .analysis-item { margin-bottom:14px; padding-bottom:14px; border-bottom:1px solid #eee; }
    .analysis-item:last-child { border-bottom:none; margin-bottom:0; padding-bottom:0; }
    .analysis-label { font-size:11px; font-weight:600; text-transform:uppercase; color:#6B7D3A; margin-bottom:4px; letter-spacing:.5px; }

    .hashtag-mid { background:#FFF3E0; color:#E65100; border:1px solid #FFE0B2; }
    .hashtag-low { background:#F3E5F5; color:#7B1FA2; border:1px solid #E1BEE7; }

    .metric-row:last-child { border-bottom:none; }
    .metric-name { font-size:13px; color:#666; }
    .metric-value { font-size:14px; font-weight:600; color:#1B2A4A; }
    .metric-change { font-size:12px; padding:2px 8px; border-radius:12px; font-weight:500; }
    .metric-up { background:#E8F5E9; color:#2E7D32; }
    .metric-down { background:#FFEBEE; color:#C62828; }
    .insight-box { background:linear-gradient(135deg,rgba(27,42,74,.03),rgba(196,98,45,.03)); border-left:3px solid #D4A030; padding:16px; border-radius:0 8px 8px 0; margin-top:16px; }
    .insight-box p { font-size:13px; color:#555; line-height:1.6; }
    .top-post-mini { display:flex; gap:16px; align-items:center; padding:16px; background:#F9FAFB; border-radius:8px; margin-top:12px; }
    .top-post-mini iframe { width:200px; height:200px; border-radius:8px; border:none; flex-shrink:0; }
    .top-post-info { flex:1; }
    .top-post-info h4 { font-size:14px; color:#1B2A4A; margin-bottom:8px; }
    .top-post-info p { font-size:12px; color:#666; line-height:1.5; }

    .strategy-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px; margin-top:20px; }
    .strategy-card { background:#F9FAFB; border:1px solid #eee; border-radius:12px; padding:20px; transition:all .2s; }
    .strategy-card:hover { border-color:#C4622D; background:#FFF; }
    .strategy-icon { font-size:28px; margin-bottom:10px; }
    .strategy-card h4 { font-size:14px; font-weight:600; color:#1B2A4A; margin-bottom:8px; }
    .strategy-card p { font-size:12px; color:#666; line-height:1.5; }
    .strategy-card .action-items { margin-top:10px; }
    .strategy-card .action-item { font-size:11px; color:#555; padding:4px 0; display:flex; align-items:flex-start; gap:6px; }
    .strategy-card .action-item::before { content:'→'; color:#C4622D; font-weight:700; flex-shrink:0; }

    @media(max-width:768px) {
      .chart-grid,.feed-grid,.competitor-grid,.locations-grid,.analyzer-grid,.strategy-grid { grid-template-columns:1fr; }
      .reels-grid { grid-template-columns:repeat(2,1fr); }
      .header { padding:16px 20px; flex-direction:column; gap:12px; }
      .tab-button { padding:10px 14px; font-size:13px; }
    }
  </style>
</head>

                  </div>
                )}

                {creadorSubTab === 'caption' && (
                  <div className="ai-section">
                    <div className="caption-writer">
                      <h3 style={{fontSize:'18px',fontWeight:600,color:'#1B2A4A',marginBottom:16,display:'flex',alignItems:'center',gap:8}}>✍️ Caption Writer</h3>
                      <p style={{fontSize:'13px',color:'#666',marginBottom:12}}>Escribí el tema o producto y elegí el tono. Se genera un caption en la voz de Oh Mexico con hashtags optimizados.</p>
                      <textarea className="caption-input" placeholder="Ej: nuestro molcajete especial, happy hour de margaritas, noche de mariachis..." value={captionInput} onChange={e => setCaptionInput(e.target.value)}/>
                      <div style={{marginTop:12}}>
                        <span style={{fontSize:'12px',fontWeight:600,color:'#1B2A4A'}}>Tono:</span>
                        <div className="tone-selector">
                          {[{id:'casual',label:'😎 Casual'},{id:'bold',label:'🔥 Bold'},{id:'storytelling',label:'📖 Storytelling'},{id:'promo',label:'📢 Promo'}].map(t => (
                            <button key={t.id} className={`tone-chip ${captionTone===t.id?'active':''}`} onClick={() => setCaptionTone(t.id)}>{t.label}</button>
                          ))}
                        </div>
                      </div>
                      <button className="generate-btn" onClick={handleCaptionGenerate} style={{marginTop:8}}>✨ Generar Caption</button>
                      {generatedCaption && (
                        <div className="caption-output">
                          <div style={{fontSize:'11px',color:'#999',marginBottom:8}}>Tono: {generatedCaption.tone}</div>
                          <div className="caption-text">{generatedCaption.text}</div>
                          <div style={{marginTop:12,padding:'12px',background:'#FFF',borderRadius:8,border:'1px solid #eee'}}>
                            <div style={{fontSize:'11px',fontWeight:600,color:'#6B7D3A',marginBottom:6}}>HASHTAGS SUGERIDOS</div>
                            <div style={{fontSize:'12px',color:'#C4622D',lineHeight:1.6}}>{generatedCaption.hashtags}</div>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {creadorSubTab === 'hashtags' && (
                  <div className="ai-section">
                    <div className="hashtag-section">
                      <h3 style={{fontSize:'18px',fontWeight:600,color:'#1B2A4A',marginBottom:4}}>🏷️ Hashtag Optimizer</h3>
                      <p style={{fontSize:'13px',color:'#666',marginBottom:20}}>Sets de hashtags organizados por alcance. Mezclá alta competencia con nicho local para maximizar el reach.</p>

                      <div style={{marginBottom:20}}>
                        <div style={{fontSize:'13px',fontWeight:600,color:'#2E7D32',marginBottom:8}}>🟢 Alto alcance (100K+ posts)</div>
                        <div className="hashtag-grid">
                          {hashtagSets.high.map((h,i) => <span key={i} className="hashtag-tag hashtag-high">{h}</span>)}
                        </div>
                      </div>
                      <div style={{marginBottom:20}}>
                        <div style={{fontSize:'13px',fontWeight:600,color:'#E65100',marginBottom:8}}>🟠 Alcance medio (10K-100K posts)</div>
                        <div className="hashtag-grid">
                          {hashtagSets.mid.map((h,i) => <span key={i} className="hashtag-tag hashtag-mid">{h}</span>)}
                        </div>
                      </div>
                      <div>
                        <div style={{fontSize:'13px',fontWeight:600,color:'#7B1FA2',marginBottom:8}}>🟣 Nicho local (menor competencia, mayor relevancia)</div>
                        <div className="hashtag-grid">
                          {hashtagSets.niche.map((h,i) => <span key={i} className="hashtag-tag hashtag-low">{h}</span>)}
                        </div>
                      </div>
                      <div className="insight-box" style={{marginTop:20}}>
                        <p><strong>💡 Tip:</strong> La mezcla ideal es 3-4 de alto alcance + 4-5 de alcance medio + 3-4 de nicho. Oh Mexico actualmente usa solo 3 hashtags por post — subir a 10-15 puede ampliar el alcance considerablemente.</p>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* ===== ANÁLISIS TAB ===== */}
            {activeTab === 'analisis' && (
              <div className="tab-content">
                <div className="sub-tabs">
                  {[{id:'posts',label:'🔍 Post Analyzer'},{id:'report',label:'📋 Informe Semanal'}].map(tab => (
                    <button key={tab.id} className={`sub-tab-button ${activeSubTab===tab.id?'active':''}`} onClick={() => setActiveSubTab(tab.id)}>
                      {tab.label}
                    </button>
                  ))}
                </div>

                {activeSubTab === 'posts' && (
                  <div>
                    <div className="pillar-selector" style={{marginBottom:20}}>
                      {postAnalysis.map((p,i) => (
                        <button key={i} className={`pillar-chip ${analyzerPost===i?'active':''}`} onClick={() => setAnalyzerPost(i)}>
                          {p.type}: {p.caption}
                        </button>
                      ))}
                    </div>
                    <div className="analyzer-grid">
                      <div className="analyzer-post">
                        <iframe src={`https://www.instagram.com/p/${postAnalysis[analyzerPost].shortcode}/embed`} style={{width:'100%',height:'500px',borderRadius:'12px',border:'none'}} loading="lazy"/>
                      </div>
                      <div className="analyzer-results">
                        <div className={`score-badge ${postAnalysis[analyzerPost].score>=80?'score-high':postAnalysis[analyzerPost].score>=60?'score-mid':'score-low'}`}>
                          ⭐ Score: {postAnalysis[analyzerPost].score}/100
                        </div>
                        <div className="analysis-item">
                          <div className="analysis-label">Métricas</div>
                          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginTop:6}}>
                            <div style={{textAlign:'center',padding:8,background:'#F9FAFB',borderRadius:8}}><div style={{fontSize:'18px',fontWeight:700,color:'#1B2A4A'}}>{postAnalysis[analyzerPost].likes}</div><div style={{fontSize:'10px',color:'#999'}}>Likes</div></div>
                            <div style={{textAlign:'center',padding:8,background:'#F9FAFB',borderRadius:8}}><div style={{fontSize:'18px',fontWeight:700,color:'#1B2A4A'}}>{postAnalysis[analyzerPost].comments}</div><div style={{fontSize:'10px',color:'#999'}}>Comments</div></div>
                            <div style={{textAlign:'center',padding:8,background:'#F9FAFB',borderRadius:8}}><div style={{fontSize:'18px',fontWeight:700,color:'#1B2A4A'}}>{postAnalysis[analyzerPost].reach}</div><div style={{fontSize:'10px',color:'#999'}}>Reach</div></div>
                          </div>
                        </div>
                        <div className="analysis-item">
                          <div className="analysis-label">Engagement</div>
                          <div className="analysis-bar"><div className="analysis-bar-fill" style={{width:`${postAnalysis[analyzerPost].score}%`,background:postAnalysis[analyzerPost].score>=80?'#4CAF50':postAnalysis[analyzerPost].score>=60?'#FF9800':'#f44336'}}/></div>
                        </div>
                        <div className="analysis-item">
                          <div className="analysis-label">✅ Fortalezas</div>
                          <div className="analysis-value">{postAnalysis[analyzerPost].strengths}</div>
                        </div>
                        <div className="analysis-item">
                          <div className="analysis-label">⚠️ Áreas de mejora</div>
                          <div className="analysis-value">{postAnalysis[analyzerPost].weaknesses}</div>
                        </div>
                        <div className="analysis-item">
                          <div className="analysis-label">💡 Recomendación</div>
                          <div className="analysis-value" style={{color:'#C4622D',fontWeight:500}}>{postAnalysis[analyzerPost].improvement}</div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {activeSubTab === 'report' && (
                  <div>
                    <div className="report-card">
                      <div className="report-header">
                        <div className="report-title">📋 Informe Semanal</div>
                        <div className="report-date">{weeklyReport.period}</div>
                      </div>
                      {weeklyReport.metrics.map((m,i) => (
                        <div key={i} className="metric-row">
                          <div className="metric-name">{m.name}</div>
                          <div style={{display:'flex',alignItems:'center',gap:10}}>
                            <div className="metric-value">{m.value}</div>
                            <div className={`metric-change ${m.up?'metric-up':'metric-down'}`}>{m.change}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                    <div className="report-card">
                      <h4 style={{fontSize:'15px',fontWeight:600,color:'#1B2A4A',marginBottom:12}}>🏆 Top Post de la Semana</h4>
                      <div className="top-post-mini">
                        <iframe src={`https://www.instagram.com/p/${weeklyReport.topPost}/embed`} loading="lazy" title="Top post"/>
                        <div className="top-post-info">
                          <h4>Taco Day Celebration</h4>
                          <p>847 likes • 62 comments • 18.6K reach</p>
                          <p style={{marginTop:8}}>Score: 92/100 — El mejor post del período por engagement y alcance.</p>
                        </div>
                      </div>
                    </div>
                    <div className="report-card">
                      <h4 style={{fontSize:'15px',fontWeight:600,color:'#1B2A4A',marginBottom:12}}>💡 Insight Principal</h4>
                      <div className="insight-box"><p>{weeklyReport.insight}</p></div>
                    </div>
                    <div className="report-card">
                      <h4 style={{fontSize:'15px',fontWeight:600,color:'#1B2A4A',marginBottom:12}}>🎯 Acciones Recomendadas</h4>
                      {weeklyReport.actions.map((a,i) => (
                        <div key={i} style={{padding:'10px 0',borderBottom:i<weeklyReport.actions.length-1?'1px solid #f0f0f0':'none',fontSize:'13px',color:'#555',display:'flex',gap:8}}>
                          <span style={{color:'#C4622D',fontWeight:700}}>→</span> {a}
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* ===== ESTRATEGIA TAB ===== */}
            {activeTab === 'estrategia' && (
              <div className="tab-content">
                <div className="ai-card" style={{marginBottom:24}}>
                  <h3>🎯 Estrategia de Mejora para @ohmexico</h3>
                  <p style={{fontSize:'13px',color:'#666'}}>Basado en el análisis del feed, estos son los ajustes concretos que pueden mejorar el rendimiento de la cuenta.</p>
                </div>
                <div className="strategy-grid">
                  {strategies.map((s,i) => (
                    <div key={i} className="strategy-card">
                      <div className="strategy-icon">{s.icon}</div>
                      <h4>{s.title}</h4>
                      <p>{s.desc}</p>
                      <div className="action-items">
                        {s.actions.map((a,j) => <div key={j} className="action-item">{a}</div>)}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ===== CALENDARIO TAB ===== */}
            {activeTab === 'calendario' && (
              <div className="tab-content">
                <div style={{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap'}}>
                  {Object.entries(calTypeColors).map(([type,color]) => (
                    <div key={type} style={{display:'flex',alignItems:'center',gap:6,fontSize:'12px'}}>
                      <div style={{width:10,height:10,borderRadius:2,background:color}}/>
                      <span style={{color:'#FFF',opacity:.7,textTransform:'capitalize'}}>{type}</span>
                    </div>
                  ))}
                </div>
                <div className="calendar-grid">
                  <div className="calendar-header">
                    {['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].map(d => (
                      <div key={d} className="calendar-day-header">{d}</div>
                    ))}
                  </div>
                  <div className="calendar-days">
                    {[null,null].concat(calendarDays).map((day,i) => {
                      if (!day) return <div key={`empty-${i}`} className="calendar-day" style={{opacity:.3,minHeight:80}}/>;
                      return (
                        <div key={day.date} className="calendar-day" style={{borderLeft:`3px solid ${calTypeColors[day.type]||'#eee'}`}}>
                          <div className="calendar-date">{day.date}</div>
                          <div className="calendar-content">{day.content}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}

            {/* ===== COMPETENCIA TAB ===== */}
            {activeTab === 'competencia' && (
              <div className="tab-content">
                <div className="comparison-chart">
                  <div className="chart-title">Comparación de Seguidores</div>
                  <ResponsiveContainer width="100%" height={280}>
                    <BarChart data={competitorData}>
                      <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0"/>
                      <XAxis dataKey="name" stroke="#666"/><YAxis stroke="#666" label={{value:'Followers (K)',angle:-90,position:'insideLeft',style:{fontSize:12}}}/>
                      <Tooltip contentStyle={{backgroundColor:'#FFF',border:'1px solid #C4622D',borderRadius:'8px'}}/>
                      <Bar dataKey="followers" fill="#C4622D" radius={[6,6,0,0]}/>
                    </BarChart>
                  </ResponsiveContainer>
                </div>
                <div className="competitor-grid">
                  {competitors.map((c,i) => (
                    <div key={i} className="competitor-card">
                      <div className="competitor-header">
                        <div className="competitor-handle">{c.handle} {c.verified && <span className="verified-badge">✓</span>} {c.michelin && <span style={{color:'#D4A030'}}>⭐</span>}</div>
                        <div className="competitor-stats">{c.followers} followers • {c.posts} posts</div>
                      </div>
                      <div className="competitor-bio">{c.bio}</div>
                      <div className="competitor-location">📍 {c.location}</div>
                      <div className="competitor-posts">
                        {c.posts_shortcodes.map((code,j) => (
                          <div key={j} className="competitor-post">
                            <iframe src={`https://www.instagram.com/p/${code}/embed`} loading="lazy" title={`${c.handle} post ${j+1}`}/>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ===== LOCACIONES TAB ===== */}
            {activeTab === 'locaciones' && (
              <div className="tab-content">
                <div className="locations-grid">
                  {locations.map((loc,i) => (
                    <div key={i} className="location-card">
                      <div className="location-header">
                        <div className="location-name">{loc.name}</div>
                        <div className="location-address">{loc.address}</div>
                      </div>
                      <div className="location-details">
                        <div className="location-detail"><strong>📞</strong> {loc.phone}</div>
                        <div className="location-detail"><strong>🕐</strong> {loc.hours}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard/>);
  </script>
</body>
</html>
